  <g font-family="'JetBrains Mono',monospace" font-size="14">
    <text x="300" y="150" fill="#565548">17:42:11.302</text><text x="420" y="150" fill="#9b9a8c">LOG  </text>
    <text x="468" y="150" fill="#ff2c4d">disem-bowling</text>
    <text x="600" y="150" fill="#f1efe3">[boot] log-tap online</text>

    <text x="300" y="180" fill="#565548">17:42:11.482</text><text x="420" y="180" fill="#6dcaff">INFO </text>
    <text x="468" y="180" fill="#ff2c4d">disem-bowling</text>
    <text x="600" y="180" fill="#f1efe3">boot complete · room=3F7Q</text>

    <text x="300" y="210" fill="#565548">17:42:13.871</text><text x="420" y="210" fill="#ffb02e">WARN </text>

  <rect x="14" y="238" width="252" height="58" rx="8" fill="rgba(255,255,255,0.04)"/>
  <circle cx="30" cy="256" r="6" fill="#5d3bff"/>
  <text x="44" y="260" font-size="15" fill="#f1efe3">disco</text>

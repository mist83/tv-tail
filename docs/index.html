<!doctype html>
<html lang="en" data-ui-theme="ghoul" data-ui-mode="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="repo-name" content="tv-tail">
    <title>tv-tail · live console for any browser app</title>
    <meta name="description" content="Hosted dashboard for tv-tail — live console + error stream from every browser app you've wired up. Filter by app, level, search.">
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">

    <!-- Canonical workspace shell + ghoul theme. ui.mullmania.com is the
         only source of layout / palette / chrome. We do not ship a styles.css. -->
    <link rel="stylesheet" href="https://ui.mullmania.com/ghoul/style.css">
    <script src="https://ui.mullmania.com/ui.js" data-ui-theme="ghoul" data-ui-mode="dark"></script>

    <!-- Telemetry: drop-in shim. We dogfood our own log-tap so this dashboard
         appears in itself when streaming. -->
    <script>window.LOG_TAP_VERSION = "dashboard";</script>
    <script src="./log-tap.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js" defer></script>
    <script type="module" src="./app.js" defer></script>

    <!-- A handful of feed-row tints that aren't part of the theme primitive
         set — kept tiny so the rest is upstream. -->
    <style>
      .feed-row { display: grid; grid-template-columns: 92px 56px 140px 60px 1fr; gap: 12px; padding: 1px 14px; align-items: baseline; white-space: pre-wrap; word-break: break-word; font-size: var(--text-sm); line-height: 1.45; }
      .feed-row:hover { background: rgba(255,255,255,0.025); }
      .feed-row .ts { color: var(--text-very-muted); font-size: var(--text-xs); }
      .feed-row .lvl { font-size: var(--text-xs); letter-spacing: 0.1em; }
      .feed-row .app { font-weight: var(--weight-bold); }
      .feed-row .ses { color: var(--text-very-muted); font-size: var(--text-xs); }
      .feed-row .msg { color: var(--text-primary); }
      .feed-row.lvl-debug .lvl { color: var(--text-very-muted); }
      .feed-row.lvl-log   .lvl { color: var(--text-muted); }
      .feed-row.lvl-info  .lvl { color: var(--color-info); }
      .feed-row.lvl-warn  .lvl { color: var(--color-warning); }
      .feed-row.lvl-error .lvl { color: var(--color-danger); }
      .feed-row.lvl-error .msg { color: #ffb6bd; }
      .feed-row.lvl-warn  .msg { color: #ffe2b2; }
      #feed { font-family: var(--font-mono); }
      #feed-empty pre { user-select: all; }
    </style>
  </head>

  <body class="builder-shell">
    <div id="header-container" class="header"></div>
    <div id="tabs-container" class="tabs"></div>
    <div id="content-container"></div>
  </body>
</html>
